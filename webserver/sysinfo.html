<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>System — Curb Energy</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #21262d;
      --text: #c9d1d9; --muted: #484f58; --accent: #388bfd;
      --green: #3fb950; --red: #f85149; --yellow: #d29922;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; align-items: center; height: 48px; flex-shrink: 0; }
    .nav-brand { font-weight: 600; font-size: 0.95rem; color: #fff; margin-right: 20px; white-space: nowrap; }
    .nav-brand span { color: var(--accent); }
    nav a { color: var(--muted); text-decoration: none; font-size: 0.82rem; padding: 0 10px; height: 48px; display: flex; align-items: center; border-bottom: 2px solid transparent; transition: color 0.15s; white-space: nowrap; }
    nav a:hover { color: var(--text); }
    nav a.active { color: #fff; border-color: var(--accent); }
    .nav-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .lang-toggle { display: flex; gap: 3px; }
    .lang-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 4px; padding: 2px 7px; font-size: 0.70rem; cursor: pointer; transition: all 0.15s; }
    .lang-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .lang-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

    main { max-width: 900px; margin: 0 auto; padding: 20px 16px; width: 100%; flex: 1; }

    /* ── Status cards ──────────────────────────────────────────────────── */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
    .stat-card.ok { border-color: rgba(63,185,80,.3); }
    .stat-card.warn { border-color: rgba(210,153,34,.3); }
    .stat-card.err { border-color: rgba(248,81,73,.3); }
    .stat-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
    .stat-val { font-size: 1.3rem; font-weight: 600; color: #fff; font-variant-numeric: tabular-nums; line-height: 1.1; }
    .stat-val.ok { color: var(--green); }
    .stat-val.warn { color: var(--yellow); }
    .stat-val.err { color: var(--red); }
    .stat-unit { font-size: 0.75rem; color: var(--muted); margin-left: 2px; font-weight: 400; }
    .stat-sub { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }

    /* ── Process status ────────────────────────────────────────────────── */
    .section { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 16px; overflow: hidden; }
    .section-hdr { padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 0.80rem; font-weight: 600; color: #e6edf3; }
    .proc-list { padding: 8px 0; }
    .proc-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 16px; font-size: 0.82rem; }
    .proc-row:hover { background: rgba(255,255,255,.02); }
    .proc-name { color: var(--text); }
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 10px; font-size: 0.70rem; font-weight: 600; }
    .badge.run { background: rgba(63,185,80,.15); color: var(--green); border: 1px solid rgba(63,185,80,.3); }
    .badge.stop { background: rgba(248,81,73,.12); color: var(--red); border: 1px solid rgba(248,81,73,.3); }
    .badge.dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    /* ── Memory bar ────────────────────────────────────────────────────── */
    .mem-bar-wrap { padding: 12px 16px; }
    .mem-labels { display: flex; justify-content: space-between; font-size: 0.72rem; color: var(--muted); margin-bottom: 5px; }
    .mem-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .mem-fill { height: 100%; border-radius: 4px; transition: width .5s ease; background: var(--accent); }
    .mem-fill.warn { background: var(--yellow); }
    .mem-fill.err  { background: var(--red); }

    footer { border-top: 1px solid var(--border); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; font-size: 0.72rem; color: var(--muted); flex-shrink: 0; max-width: 900px; margin: 0 auto; width: 100%; }
    .coffee-btn { display: inline-flex; align-items: center; gap: 5px; background: #FFDD00; color: #1a1a1a; padding: 5px 13px; border-radius: 20px; font-weight: 600; font-size: 0.75rem; text-decoration: none; transition: opacity .15s; }
    .coffee-btn:hover { opacity: 0.85; }
    .kofi-btn { display: inline-flex; align-items: center; text-decoration: none; transition: opacity .15s; }
    .kofi-btn:hover { opacity: 0.85; }
    .support-btns { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    .refresh-btn { background: #21262d; border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 6px 14px; font-size: 0.80rem; cursor: pointer; transition: border-color .15s; }
    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
    .last-update { font-size: 0.70rem; color: var(--muted); }
  </style>
</head>
<body>

<nav>
  <div class="nav-brand">&#9889; <span>Curb</span> Energy</div>
  <a href="energy.html" data-i18n="nav_dash">Dashboard</a>
  <a href="calibration.html" data-i18n="nav_cal">Kalibrering</a>
  <a href="settings.html" data-i18n="nav_set">Innstillinger</a>
  <a href="sysinfo.html" class="active" data-i18n="nav_sys">System</a>
  <div class="nav-right">
    <div class="lang-toggle">
      <button class="lang-btn" data-lang="no" onclick="applyLang('no')">NO</button>
      <button class="lang-btn" data-lang="en" onclick="applyLang('en')">EN</button>
    </div>
  </div>
</nav>

<main>

  <!-- Status cards -->
  <div class="stat-grid">
    <div class="stat-card" id="card-uptime">
      <div class="stat-label" data-i18n="lbl_uptime">Oppetid</div>
      <div class="stat-val" id="val-uptime">—</div>
    </div>
    <div class="stat-card" id="card-data">
      <div class="stat-label" data-i18n="lbl_data_age">Data alder</div>
      <div class="stat-val" id="val-data">—<span class="stat-unit">s</span></div>
      <div class="stat-sub" id="sub-data"></div>
    </div>
    <div class="stat-card" id="card-mem">
      <div class="stat-label" data-i18n="lbl_mem">Ledig minne</div>
      <div class="stat-val" id="val-mem">—<span class="stat-unit">MB</span></div>
      <div class="stat-sub" id="sub-mem"></div>
    </div>
    <div class="stat-card" id="card-load">
      <div class="stat-label" data-i18n="lbl_load">CPU-last (1m)</div>
      <div class="stat-val" id="val-load">—</div>
      <div class="stat-sub" id="sub-load"></div>
    </div>
  </div>

  <!-- Memory bar -->
  <div class="section">
    <div class="section-hdr" data-i18n="hdr_mem">Minnebruk</div>
    <div class="mem-bar-wrap">
      <div class="mem-labels">
        <span data-i18n="mem_used">Brukt</span>
        <span id="mem-pct-lbl">—%</span>
      </div>
      <div class="mem-bar"><div class="mem-fill" id="mem-fill" style="width:0%"></div></div>
      <div class="mem-labels" style="margin-top:4px">
        <span id="mem-used-lbl">—</span>
        <span id="mem-total-lbl">—</span>
      </div>
    </div>
  </div>

  <!-- Process status -->
  <div class="section">
    <div class="section-hdr" data-i18n="hdr_proc">Prosesser</div>
    <div class="proc-list">
      <div class="proc-row">
        <span class="proc-name">sampler.lua</span>
        <span class="badge" id="badge-sampler"><span class="badge dot"></span> —</span>
      </div>
      <div class="proc-row">
        <span class="proc-name">mqtt-streamer.lua</span>
        <span class="badge" id="badge-streamer"><span class="badge dot"></span> —</span>
      </div>
      <div class="proc-row">
        <span class="proc-name">api-server.lua</span>
        <span class="badge run"><span class="badge dot"></span> <span data-i18n="proc_run">Kjoerer</span></span>
      </div>
    </div>
  </div>

  <!-- Refresh -->
  <div style="display:flex;align-items:center;gap:12px;margin-top:4px">
    <button class="refresh-btn" onclick="load()" data-i18n="btn_refresh">Oppdater</button>
    <span class="last-update" id="last-update"></span>
  </div>

</main>

<footer>
  <span data-i18n="credit">Utviklet av Vegard Myrvang</span>
  <div class="support-btns">
    <a class="coffee-btn" href="https://buymeacoffee.com/vegardm" target="_blank" rel="noopener">
      ☕ <span data-i18n="coffee">Kjøp meg en kaffe</span>
    </a>
    <a class="kofi-btn" href="https://ko-fi.com/D1D61JYEPS" target="_blank" rel="noopener">
      <img src="https://ko-fi.com/img/githubbutton_sm.svg" alt="Support on Ko-fi" style="height:24px;">
    </a>
  </div>
</footer>

<script>
const API = 'http://' + location.hostname + ':8080';

const T = {
  no: {
    nav_dash:'Dashboard', nav_cal:'Kalibrering', nav_set:'Innstillinger', nav_sys:'System',
    lbl_uptime:'Oppetid', lbl_data_age:'Data alder', lbl_mem:'Ledig minne', lbl_load:'CPU-last (1m)',
    hdr_mem:'Minnebruk', mem_used:'Brukt',
    hdr_proc:'Prosesser', proc_run:'Kjoerer', proc_stop:'Stoppet',
    btn_refresh:'Oppdater',
    data_ok:'Data er fersk', data_stale:'Data er gammel',
    credit:'Utviklet av Vegard Myrvang', coffee:'Kjøp meg en kaffe',
  },
  en: {
    nav_dash:'Dashboard', nav_cal:'Calibration', nav_set:'Settings', nav_sys:'System',
    lbl_uptime:'Uptime', lbl_data_age:'Data age', lbl_mem:'Free memory', lbl_load:'CPU load (1m)',
    hdr_mem:'Memory usage', mem_used:'Used',
    hdr_proc:'Processes', proc_run:'Running', proc_stop:'Stopped',
    btn_refresh:'Refresh',
    data_ok:'Data is fresh', data_stale:'Data is stale',
    credit:'Developed by Vegard Myrvang', coffee:'Buy me a coffee',
  },
};
let lang = localStorage.getItem('curb_lang') || 'no';

function applyLang(l) {
  lang = l; localStorage.setItem('curb_lang', l);
  const tr=T[l]||T.no;
  document.querySelectorAll('[data-i18n]').forEach(el=>{ const k=el.dataset.i18n; if(tr[k]!=null) el.textContent=tr[k]; });
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active', b.dataset.lang===l));
}

function fmtUptime(secs) {
  const d=Math.floor(secs/86400), h=Math.floor(secs%86400/3600), m=Math.floor(secs%3600/60);
  if(d>0) return d+'d '+h+'h '+m+'m';
  if(h>0) return h+'h '+m+'m';
  return m+'m '+(secs%60)+'s';
}

function fmtBytes(kb) {
  if(kb>=1024*1024) return (kb/1024/1024).toFixed(1)+' GB';
  if(kb>=1024) return (kb/1024).toFixed(0)+' MB';
  return kb+' kB';
}

function setBadge(id, running) {
  const tr=T[lang]||T.no;
  const el=document.getElementById(id);
  el.className='badge '+(running?'run':'stop');
  el.innerHTML='<span class="badge dot"></span> '+(running?tr.proc_run:tr.proc_stop);
}

async function load() {
  try {
    const res=await fetch(API+'/api/status');
    if(!res.ok) throw new Error('HTTP '+res.status);
    const d=await res.json();
    const tr=T[lang]||T.no;

    // Uptime
    document.getElementById('val-uptime').textContent = d.uptime_secs ? fmtUptime(Math.round(d.uptime_secs)) : '—';

    // Data age
    const age=d.data_age_secs;
    const dataEl=document.getElementById('val-data');
    if(age!=null){
      dataEl.innerHTML=Math.round(age)+'<span class="stat-unit">s</span>';
      dataEl.className='stat-val '+(age<15?'ok':age<120?'warn':'err');
      document.getElementById('sub-data').textContent=age<15?tr.data_ok:tr.data_stale;
      document.getElementById('card-data').className='stat-card '+(age<15?'ok':age<120?'warn':'err');
    }

    // Memory
    if(d.mem_total_kb && d.mem_avail_kb!=null){
      const avail=d.mem_avail_kb, total=d.mem_total_kb;
      const used=total-avail;
      const pct=Math.round(used/total*100);
      document.getElementById('val-mem').innerHTML=(avail/1024).toFixed(0)+'<span class="stat-unit">MB</span>';
      document.getElementById('sub-mem').textContent=pct+'% '+tr.mem_used.toLowerCase();
      document.getElementById('card-mem').className='stat-card '+(pct<70?'ok':pct<85?'warn':'err');
      document.getElementById('mem-pct-lbl').textContent=pct+'%';
      document.getElementById('mem-used-lbl').textContent=fmtBytes(used);
      document.getElementById('mem-total-lbl').textContent=fmtBytes(total);
      const fill=document.getElementById('mem-fill');
      fill.style.width=pct+'%';
      fill.className='mem-fill '+(pct<70?'':'pct<85?warn:err');
      fill.className='mem-fill'+(pct>=85?' err':pct>=70?' warn':'');
    }

    // Load
    if(d.load_1m!=null){
      document.getElementById('val-load').textContent=d.load_1m.toFixed(2);
      document.getElementById('sub-load').textContent=d.load_5m.toFixed(2)+' / '+d.load_15m.toFixed(2)+' (5m/15m)';
    }

    // Processes
    setBadge('badge-streamer', d.streamer_running);
    setBadge('badge-sampler',  d.sampler_running);

    document.getElementById('last-update').textContent=new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById('val-uptime').textContent='—';
  }
}

applyLang(lang);
load();
setInterval(load, 10000);
</script>
</body>
</html>
